name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure GHCR anonymous pull (drop stale registry credential)
        uses: azure/CLI@v2
        with:
          inlineScript: |
            # GHCR パッケージは public のため認証情報は不要。
            # 失効済み認証情報が残っていると ImagePullUnauthorized になるため毎デプロイで除去する。
            az containerapp registry remove \
              --name ${{ vars.CONTAINER_APP_NAME }} \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --server ${{ env.REGISTRY }} \
              || echo "No ${{ env.REGISTRY }} registry credential set (already clean)"

      - name: Deploy to Azure Container Apps
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp update \
              --name ${{ vars.CONTAINER_APP_NAME }} \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
